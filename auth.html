<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | NexGenWebLab</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], },
                    colors: { primary: '#6D28D9', secondary: '#DB2777', }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="min-h-screen bg-slate-50 font-sans text-slate-900 antialiased flex flex-col justify-center items-center p-4">

    <a href="index.html" class="absolute top-6 left-6 text-sm font-semibold text-slate-500 hover:text-slate-900 transition-colors">
        <i class="fa-solid fa-arrow-left mr-2"></i> Back to Home
    </a>

    <div class="absolute top-6 right-6 hidden sm:flex items-center gap-3">
        <a href="https://tools.nexgenweblab.com" class="text-sm font-semibold text-slate-600 hover:text-slate-900">Log in</a>
        <a href="https://tools.nexgenweblab.com" class="text-sm font-bold bg-slate-900 text-white px-5 py-2 rounded-lg hover:bg-slate-800 transition-all shadow-md">
            Open App <i class="fa-solid fa-arrow-right ml-1"></i>
        </a>
    </div>

    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-200 p-8 sm:p-10">
        
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-primary/10 text-primary text-2xl mb-4">
                <i class="fa-solid fa-user-plus"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-tight">Create an account</h1>
            <p class="text-slate-500 text-sm mt-2">Sign up to access NexGenWebLab tools</p>
        </div>

        <form id="auth-form" class="space-y-5">
            <div>
                <label for="email" class="block text-sm font-semibold text-slate-700 mb-1.5">Email address</label>
                <input type="email" id="email" required placeholder="you@company.com" 
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all font-medium">
            </div>
            
            <div>
                <label for="password" class="block text-sm font-semibold text-slate-700 mb-1.5">Password</label>
                <input type="password" id="password" required placeholder="••••••••" 
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all font-medium">
            </div>

            <button type="submit" class="w-full py-3 px-4 rounded-xl font-bold bg-slate-900 text-white hover:bg-slate-800 transition-colors mt-2">
                Create Account
            </button>
        </form>
        <button type="button" id="google-login-btn" class="mt-6 w-full py-3 px-4 rounded-xl font-bold border border-slate-200 text-slate-700 bg-white hover:bg-slate-50 transition-colors flex items-center justify-center gap-2">
    <i class="fa-brands fa-google text-red-500"></i> Google
    </button>
        <p class="text-center text-sm text-slate-600 mt-8 font-medium">
            Already have an account? <a href="https://tools.nexgenweblab.com" class="text-primary hover:underline">Log in here</a>
        </p>
    </div>

    <script src="assets/js/auth.js"></script>
</body>
</html>
