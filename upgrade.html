<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upgrade to Pro | NexGenWebLab Enterprise SEO</title>
    <meta name="description" content="Upgrade to NexGenWebLab Enterprise Pro for white label SEO reports, bulk analysis, traffic analytics, and priority support.">
    <link rel="canonical" href="https://nexgenweblab.com/upgrade">
    <link rel="icon" type="image/png" href="/assets/images/favicon.png?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] }, colors: { primary: '#6D28D9', secondary: '#DB2777' } } } }
    </script>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-50 to-white font-sans text-slate-900 antialiased flex flex-col relative overflow-hidden">
    <div class="absolute top-0 right-0 w-[400px] h-[400px] bg-primary/5 rounded-full blur-[100px] translate-x-1/2 -translate-y-1/2"></div>
    <div class="absolute bottom-0 left-0 w-[400px] h-[400px] bg-secondary/5 rounded-full blur-[100px] -translate-x-1/2 translate-y-1/2"></div>

    <a href="/" class="absolute top-5 left-5 z-20 flex items-center gap-2 text-sm font-bold text-slate-500 hover:text-slate-900 transition-colors bg-white/80 backdrop-blur-sm px-4 py-2.5 rounded-xl shadow-sm border border-slate-200">
        <i class="fa-solid fa-arrow-left"></i> Back to Home
    </a>

    <div class="w-full max-w-lg mx-auto bg-white rounded-3xl shadow-xl border border-slate-200 p-8 sm:p-10 my-8 sm:my-12 relative z-10 text-center">
        <div class="text-center mb-7">
            <div class="w-14 h-14 bg-gradient-to-br from-primary to-secondary rounded-2xl flex items-center justify-center mx-auto mb-5 shadow-lg">
                <i class="fa-solid fa-credit-card text-white text-xl"></i>
            </div>
            <h1 class="text-2xl font-black tracking-tight">Complete Your Upgrade</h1>
            <p class="text-slate-500 font-medium text-sm mt-1.5">Simulating secure payment for Enterprise Pro.</p>
        </div>

        <div class="bg-gradient-to-r from-primary/5 to-secondary/5 border border-primary/10 rounded-2xl p-5 mb-6 text-left">
            <div class="flex items-center gap-3 text-sm font-bold text-slate-700">
                <i class="fa-solid fa-crown text-secondary"></i> Enterprise Pro — <span class="text-secondary">$9.99/month</span>
            </div>
            <ul class="mt-3 space-y-2 text-xs font-medium text-slate-600">
                <li class="flex items-center gap-2"><i class="fa-solid fa-check text-emerald-500 text-xs"></i> White Label Reports</li>
                <li class="flex items-center gap-2"><i class="fa-solid fa-check text-emerald-500 text-xs"></i> Bulk SEO Analysis</li>
                <li class="flex items-center gap-2"><i class="fa-solid fa-check text-emerald-500 text-xs"></i> Traffic Analytics</li>
                <li class="flex items-center gap-2"><i class="fa-solid fa-check text-emerald-500 text-xs"></i> Priority Support</li>
            </ul>
        </div>

        <button type="button" id="dummy-payment-btn" class="w-full py-3.5 rounded-lg font-bold bg-gradient-to-r from-primary to-secondary text-white hover:brightness-110 transition-all text-base shadow-md flex items-center justify-center gap-2">
            Confirm & Pay $9.99/mo <i class="fa-solid fa-arrow-right"></i>
        </button>

        <p class="text-center text-xs text-slate-400 font-medium mt-6">14-day money-back guarantee. Cancel anytime.</p>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const payBtn = document.getElementById('dummy-payment-btn');
            payBtn.addEventListener('click', () => {
                payBtn.innerText = 'Processing Payment...';
                payBtn.disabled = true;
                setTimeout(() => {
                    // Simulate successful payment and redirect to dashboard with Pro plan
                    window.location.href = 'https://tools.nexgenweblab.com/?plan=pro';
                }, 2000);
            });
        });
    </script>
</body>
</html>
