<!DOCTYPE html>
<html lang="en-US" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | NexGenWebLab Technical Support</title>
    <link rel="icon" type="image/png" href="/assets/images/favicon.png?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'], }, colors: { primary: '#6D28D9', secondary: '#DB2777', } } } }
    </script>
</head>
<body class="bg-white text-slate-900 antialiased flex flex-col min-h-screen overflow-x-hidden">

    <header class="sticky top-0 z-[100] backdrop-blur-xl border-b border-slate-100 bg-white/80">
        <div class="max-w-7xl mx-auto flex items-center justify-between h-20 px-4 sm:px-6 lg:px-8">
            <a href="/"><img src="/assets/images/logo.png" class="h-10 w-auto"></a>
            <nav class="hidden lg:flex items-center gap-10 font-bold text-sm text-slate-500">
                <a href="/">Home</a><a href="/about">About</a><a href="/pricing">Pricing</a><a href="/contact" class="text-primary">Contact</a>
            </nav>
            <div class="hidden lg:flex items-center gap-5"><a href="/auth" class="text-sm font-black bg-slate-900 text-white px-7 py-3.5 rounded-2xl">Start Free</a></div>
            <button id="mobile-menu-btn" class="lg:hidden text-2xl"><i class="fa-solid fa-bars"></i></button>
        </div>
    </header>

    <main class="flex-grow py-24">
        <div class="max-w-7xl mx-auto px-4 grid lg:grid-cols-2 gap-20 items-center">
            <div data-aos="fade-right">
                <h1 class="text-5xl font-black mb-8">Get Technical <span class="text-secondary">Assistance</span></h1>
                <p class="text-xl text-slate-500 font-bold mb-12">Need help with your <b>technical seo audit</b> or enterprise billing? Our team is available 24/7 to assist your agency.</p>
                <div class="p-8 bg-slate-50 rounded-3xl border border-slate-200 inline-flex items-center gap-6">
                    <div class="w-16 h-16 bg-white shadow-md rounded-2xl flex items-center justify-center text-primary text-2xl"><i class="fa-solid fa-headset"></i></div>
                    <div><p class="text-sm font-black text-slate-400 uppercase tracking-widest">Email Support</p><p class="text-xl font-black">support@nexgenweblab.com</p></div>
                </div>
            </div>
            
            <div class="bg-white rounded-[3rem] p-10 shadow-2xl border border-slate-100" data-aos="fade-left">
                <form class="space-y-6">
                    <input type="text" placeholder="Full Name" class="w-full px-6 py-4 rounded-2xl bg-slate-50 border border-slate-200 outline-none focus:border-primary font-bold">
                    <input type="email" placeholder="Work Email" class="w-full px-6 py-4 rounded-2xl bg-slate-50 border border-slate-200 outline-none focus:border-primary font-bold">
                    <textarea placeholder="Message" rows="5" class="w-full px-6 py-4 rounded-2xl bg-slate-50 border border-slate-200 outline-none focus:border-primary font-bold"></textarea>
                    <button class="w-full py-5 bg-slate-900 text-white font-black rounded-2xl hover:bg-slate-800 transition-all text-lg shadow-lg">Send Message</button>
                </form>
            </div>
        </div>
    </main>

    <footer class="bg-slate-950 text-slate-500 py-12 text-center text-xs font-black uppercase tracking-widest border-t border-white/5">
        &copy; 2026 NexGenWebLab. Empowering SEO Agencies.
    </footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script> AOS.init(); </script>
</body>
</html>
