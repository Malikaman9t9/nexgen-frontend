<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Post Editor — Admin — NexGenWebLab</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="/assets/images/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/quill/2.0.3/quill.snow.css" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] }, colors: { primary: '#6D28D9', secondary: '#DB2777' } } } }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/quill/2.0.3/quill.min.js"></script>
  <style>
    .sidebar-link { transition: all 0.15s; }
    .sidebar-link:hover { background: rgba(109,40,217,0.06); color: #6D28D9; }
    .ql-editor { min-height: 400px; font-size: 16px; line-height: 1.8; }
    .ql-editor h1, .ql-editor h2, .ql-editor h3 { font-weight: 800; }
    .ql-editor img { max-width: 100%; border-radius: 8px; }
    .ql-editor blockquote { border-left: 4px solid #6D28D9; padding-left: 1rem; color: #64748b; font-style: italic; }
    .ql-editor pre { background: #1e293b; color: #e2e8f0; padding: 1rem; border-radius: 8px; }
    .ql-editor a { color: #6D28D9; font-weight: 600; }
    .ql-toolbar { border-radius: 12px 12px 0 0; border-color: #e2e8f0; }
    .ql-container { border-radius: 0 0 12px 12px; border-color: #e2e8f0; font-family: inherit; }
    .status-toggle { transition: all 0.2s; }
    .status-toggle.active { background: #6D28D9; color: #fff; border-color: #6D28D9; }
    @keyframes fadeSlide { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .animate-in { animation: fadeSlide 0.3s ease; }
  </style>
</head>
<body class="font-sans antialiased bg-slate-50 text-slate-900 min-h-screen flex">
  <aside class="hidden md:flex md:w-64 md:flex-col md:fixed md:inset-y-0 bg-white border-r border-slate-200">
    <div class="flex items-center h-16 px-6 border-b border-slate-200">
      <a href="/" class="flex items-center gap-2"><img src="/assets/images/logo.png" alt="NexGenWebLab" class="h-6"></a>
    </div>
    <nav class="flex-1 px-3 py-4 space-y-1 overflow-y-auto">
      <a href="/admin/dashboard.html" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-semibold text-slate-500">
        <i class="fa-solid fa-table-columns w-5 text-center"></i> Posts
      </a>
      <a href="/admin/editor.html" class="sidebar-link active flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-semibold text-primary bg-primary/10">
        <i class="fa-solid fa-plus w-5 text-center"></i> New Post
      </a>
      <a href="/admin/dashboard.html?tab=settings" class="sidebar-link flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-semibold text-slate-500">
        <i class="fa-solid fa-gear w-5 text-center"></i> Settings
      </a>
    </nav>
    <div class="p-3 border-t border-slate-200">
      <button id="logout-btn" class="flex items-center gap-3 w-full px-3 py-2.5 rounded-xl text-sm font-semibold text-red-500 hover:bg-red-50 transition-all">
        <i class="fa-solid fa-right-from-bracket w-5 text-center"></i> Logout
      </button>
    </div>
  </aside>

  <div class="md:pl-64 flex flex-col flex-1">
    <header class="sticky top-0 z-30 bg-white/80 backdrop-blur-md border-b border-slate-200">
      <div class="flex items-center justify-between h-16 px-4 sm:px-6">
        <div class="flex items-center gap-3">
          <button id="mobile-menu-btn" class="md:hidden p-2 rounded-lg hover:bg-slate-100"><i class="fa-solid fa-bars text-lg text-slate-600"></i></button>
          <h1 class="text-lg font-black text-slate-900"><span id="editor-title">New Post</span></h1>
        </div>
        <div class="flex items-center gap-2">
          <button id="delete-btn" class="hidden px-4 py-2 rounded-xl text-sm font-bold text-red-500 hover:bg-red-50 border border-transparent hover:border-red-200 transition-all">
            <i class="fa-solid fa-trash-can"></i>
          </button>
          <button id="save-btn" class="px-5 py-2 rounded-xl bg-slate-900 text-white text-sm font-bold hover:bg-slate-800 transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2">
            <i class="fa-solid fa-cloud-upload-alt"></i> <span>Save</span>
          </button>
        </div>
      </div>
    </header>

    <main class="flex-1 p-4 sm:p-6 lg:p-8 max-w-4xl mx-auto w-full">
      <div id="loading-state" class="text-center py-20">
        <div class="inline-block w-8 h-8 border-4 border-primary/20 border-t-primary rounded-full animate-spin"></div>
        <p class="text-slate-500 font-bold text-sm mt-3">Loading...</p>
      </div>

      <form id="editor-form" class="hidden space-y-6 animate-in">
        <div class="grid sm:grid-cols-2 gap-5">
          <div>
            <label for="title" class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-2">Title</label>
            <input type="text" id="title" required placeholder="Enter blog post title" class="w-full h-11 px-4 rounded-xl border-2 border-slate-200 bg-white text-sm font-semibold outline-none transition-all focus:border-primary focus:shadow-[0_0_0_3px_rgba(109,40,217,0.08)]">
          </div>
          <div>
            <label for="slug" class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-2">Slug</label>
            <input type="text" id="slug" required placeholder="my-blog-post" class="w-full h-11 px-4 rounded-xl border-2 border-slate-200 bg-white text-sm font-mono font-semibold outline-none transition-all focus:border-primary focus:shadow-[0_0_0_3px_rgba(109,40,217,0.08)]">
          </div>
        </div>

        <div>
          <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-2">Content</label>
          <div id="quill-editor"></div>
        </div>

        <div>
          <label for="excerpt" class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-2">Excerpt</label>
          <textarea id="excerpt" rows="2" placeholder="Brief summary for blog cards..." class="w-full px-4 py-3 rounded-xl border-2 border-slate-200 bg-white text-sm font-medium outline-none transition-all focus:border-primary focus:shadow-[0_0_0_3px_rgba(109,40,217,0.08)]"></textarea>
          <div class="flex justify-end mt-1">
            <span id="excerpt-counter" class="text-xs font-semibold text-slate-400">0 / 300</span>
          </div>
        </div>

        <div class="grid sm:grid-cols-2 gap-5">
        <div>
          <label for="cover-image" class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-2">Cover Image URL</label>
          <input type="url" id="cover-image" placeholder="https://example.com/image.jpg" class="w-full h-11 px-4 rounded-xl border-2 border-slate-200 bg-white text-sm font-medium outline-none transition-all focus:border-primary focus:shadow-[0_0_0_3px_rgba(109,40,217,0.08)]">
          <div id="cover-preview" class="hidden mt-2 rounded-xl overflow-hidden border border-slate-200 max-h-40">
            <img id="cover-preview-img" src="" alt="Cover preview" class="w-full h-full object-cover">
          </div>
        </div>
          <div>
            <label for="author-name" class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-2">Author Name</label>
            <input type="text" id="author-name" placeholder="NexGenWebLab Team" class="w-full h-11 px-4 rounded-xl border-2 border-slate-200 bg-white text-sm font-semibold outline-none transition-all focus:border-primary focus:shadow-[0_0_0_3px_rgba(109,40,217,0.08)]">
          </div>
        </div>

        <div>
          <label for="tags" class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-2">Tags</label>
          <input type="text" id="tags" placeholder="seo, web development, marketing" class="w-full h-11 px-4 rounded-xl border-2 border-slate-200 bg-white text-sm font-medium outline-none transition-all focus:border-primary focus:shadow-[0_0_0_3px_rgba(109,40,217,0.08)]">
          <div id="tags-pills" class="flex flex-wrap gap-2 mt-2"></div>
        </div>

        <div>
          <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-3">Status</label>
          <div class="flex gap-2">
            <button type="button" id="status-draft" class="status-toggle active px-6 py-2.5 rounded-xl text-sm font-bold border-2 border-slate-200 text-slate-600">Draft</button>
            <button type="button" id="status-published" class="status-toggle px-6 py-2.5 rounded-xl text-sm font-bold border-2 border-slate-200 text-slate-400">Published</button>
          </div>
        </div>
      </form>
    </main>
  </div>

  <!-- Mobile sidebar -->
  <div id="mobile-sidebar" class="fixed inset-0 z-40 hidden">
    <div class="absolute inset-0 bg-black/30"></div>
    <div class="relative w-64 h-full bg-white shadow-xl p-4">
      <div class="flex items-center justify-between mb-6">
        <img src="/assets/images/logo.png" alt="NexGenWebLab" class="h-6">
        <button id="close-mobile" class="p-2 rounded-lg hover:bg-slate-100"><i class="fa-solid fa-xmark text-lg text-slate-500"></i></button>
      </div>
      <nav class="space-y-1">
        <a href="/admin/dashboard.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-semibold text-slate-500 hover:bg-slate-50"><i class="fa-solid fa-table-columns w-5 text-center"></i> Posts</a>
        <a href="/admin/editor.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-bold text-primary bg-primary/10"><i class="fa-solid fa-plus w-5 text-center"></i> New Post</a>
      </nav>
      <div class="absolute bottom-4 left-4 right-4">
        <button id="mobile-logout" class="flex items-center gap-3 w-full px-3 py-2.5 rounded-xl text-sm font-semibold text-red-500 hover:bg-red-50"><i class="fa-solid fa-right-from-bracket w-5 text-center"></i> Logout</button>
      </div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://ubnvjmvobwzsystdktpk.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVibnZqbXZvYnd6c3l0ZGt0cGsiLCJyb2xlIjoiYW5vbiIsImlhdCI6MTY0MzE2MjIwMSwiZXhwIjoxOTU4NzM4MjAxfQ.VHm8R3QkY8GbnGMoJCL-FP3T3Y3fqBfNLqhYJ3Ew1R8';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const params = new URLSearchParams(window.location.search);
    const postId = params.get('id');
    let editPostId = postId;
    let currentStatus = 'draft';

    // Auth check
    (async () => {
      const { data: { session } } = await supabase.auth.getSession();
      if (!session) { window.location.href = '/auth.html'; return; }
      const { data: admin } = await supabase.from('admin_users').select('id, role').eq('id', session.user.id).single();
      if (!admin) { await supabase.auth.signOut(); window.location.href = '/auth.html'; return; }
      sessionStorage.setItem('nexgen_admin_role', admin.role);
      initEditor();
    })();

    function generateSlug(title) {
      return title
        .toLowerCase()
        .replace(/[^a-z0-9\s-]/g, '')
        .replace(/\s+/g, '-')
        .replace(/-+/g, '-')
        .replace(/^-+|-+$/g, '');
    }

    let quill;

    function initEditor() {
      const form = document.getElementById('editor-form');
      const loading = document.getElementById('loading-state');
      const titleEl = document.getElementById('editor-title');
      const deleteBtn = document.getElementById('delete-btn');

      quill = new Quill('#quill-editor', {
        theme: 'snow',
        modules: {
          toolbar: [
            [{ header: [1, 2, 3, false] }],
            ['bold', 'italic', 'underline', 'strike'],
            [{ list: 'ordered' }, { list: 'bullet' }],
            ['blockquote', 'code-block'],
            [{ color: [] }, { background: [] }],
            ['link', 'image'],
            ['clean']
          ]
        },
        placeholder: 'Write your blog post content here...'
      });

      // Auto-generate slug from title
      document.getElementById('title').addEventListener('input', function () {
        const slugEl = document.getElementById('slug');
        if (!slugEl.dataset.manual) {
          slugEl.value = generateSlug(this.value);
        }
      });

      document.getElementById('slug').addEventListener('input', function () {
        this.dataset.manual = this.value.length > 0 ? 'true' : '';
      });

      // Cover image preview
      document.getElementById('cover-image').addEventListener('input', function () {
        const preview = document.getElementById('cover-preview');
        const img = document.getElementById('cover-preview-img');
        const url = this.value.trim();
        if (url) {
          preview.classList.remove('hidden');
          img.src = url;
          img.onerror = function () { preview.classList.add('hidden'); };
        } else {
          preview.classList.add('hidden');
        }
      });

      // Tags pills
      document.getElementById('tags').addEventListener('input', function () {
        const container = document.getElementById('tags-pills');
        const tags = this.value.split(',').map(t => t.trim()).filter(Boolean);
        container.innerHTML = tags.map(tag =>
          '<span class="inline-block bg-primary/5 text-primary text-xs font-bold px-3 py-1 rounded-full">' + tag + '</span>'
        ).join('');
      });

      // Excerpt character counter
      document.getElementById('excerpt').addEventListener('input', function () {
        const counter = document.getElementById('excerpt-counter');
        const len = this.value.length;
        counter.textContent = len + ' / 300';
        counter.className = 'text-xs font-semibold ' + (len > 300 ? 'text-red-500' : 'text-slate-400');
      });

      // Status toggle
      document.getElementById('status-draft').addEventListener('click', () => setStatus('draft'));
      document.getElementById('status-published').addEventListener('click', () => setStatus('published'));

      if (editPostId) {
        titleEl.textContent = 'Edit Post';
        deleteBtn.classList.remove('hidden');
        loadPost(editPostId);
      } else {
        loading.style.display = 'none';
        form.classList.remove('hidden');
      }
    }

    function setStatus(status) {
      currentStatus = status;
      document.getElementById('status-draft').className = 'status-toggle px-6 py-2.5 rounded-xl text-sm font-bold border-2 ' +
        (status === 'draft' ? 'active bg-primary text-white border-primary' : 'border-slate-200 text-slate-400');
      document.getElementById('status-published').className = 'status-toggle px-6 py-2.5 rounded-xl text-sm font-bold border-2 ' +
        (status === 'published' ? 'active bg-primary text-white border-primary' : 'border-slate-200 text-slate-400');
    }

    async function loadPost(id) {
      try {
        const { data: post, error } = await supabase.from('blog_posts').select('*').eq('id', id).single();
        if (error) throw error;

        document.getElementById('title').value = post.title;
        document.getElementById('slug').value = post.slug;
        document.getElementById('slug').dataset.manual = 'true';
        document.getElementById('excerpt').value = post.excerpt || '';
        document.getElementById('cover-image').value = post.cover_image_url || '';
        document.getElementById('author-name').value = post.author_name || 'NexGenWebLab Team';
        document.getElementById('tags').value = (post.tags || []).join(', ');
        setStatus(post.status || 'draft');

        if (post.content) {
          quill.root.innerHTML = post.content;
        }

        document.getElementById('loading-state').style.display = 'none';
        document.getElementById('editor-form').classList.remove('hidden');
      } catch (err) {
        alert('Failed to load post: ' + err.message);
        window.location.href = '/admin/dashboard.html';
      }
    }

    // Save
    document.getElementById('save-btn').addEventListener('click', async () => {
      const title = document.getElementById('title').value.trim();
      const slug = document.getElementById('slug').value.trim();
      const content = quill.root.innerHTML;
      const excerpt = document.getElementById('excerpt').value.trim() || content.replace(/<[^>]*>/g, '').substring(0, 200).replace(/\s+\S*$/, '');
      const coverImageUrl = document.getElementById('cover-image').value.trim() || null;
      const authorName = document.getElementById('author-name').value.trim() || 'NexGenWebLab Team';
      const tags = document.getElementById('tags').value.split(',').map(t => t.trim()).filter(Boolean);
      const status = currentStatus;

      if (!title) { alert('Title is required.'); return; }
      if (!slug) { alert('Slug is required.'); return; }

      const btn = document.getElementById('save-btn');
      btn.disabled = true;
      btn.querySelector('span').textContent = 'Saving...';

      const payload = {
        title,
        slug,
        content,
        excerpt,
        cover_image_url: coverImageUrl,
        author_name: authorName,
        tags,
        status,
        updated_at: new Date().toISOString()
      };

      if (status === 'published') {
        const { data: existing } = editPostId
          ? await supabase.from('blog_posts').select('published_at').eq('id', editPostId).single()
          : { data: null };
        if (!existing || !existing.published_at) {
          payload.published_at = new Date().toISOString();
        }
      }

      try {
        if (editPostId) {
          const { error } = await supabase.from('blog_posts').update(payload).eq('id', editPostId);
          if (error) throw error;
        } else {
          const { data, error } = await supabase.from('blog_posts').insert(payload).select('id').single();
          if (error) throw error;
          editPostId = data.id;
          document.getElementById('editor-title').textContent = 'Edit Post';
          document.getElementById('delete-btn').classList.remove('hidden');
          window.history.replaceState(null, '', '/admin/editor?id=' + data.id);
        }
        btn.querySelector('span').textContent = 'Saved';
        setTimeout(() => { btn.querySelector('span').textContent = 'Save'; btn.disabled = false; }, 1500);
      } catch (err) {
        alert('Save failed: ' + err.message);
        btn.querySelector('span').textContent = 'Save';
        btn.disabled = false;
      }
    });

    // Delete
    document.getElementById('delete-btn').addEventListener('click', () => {
      if (!editPostId) return;
      if (!confirm('Are you sure you want to delete this post? This action cannot be undone.')) return;
      (async () => {
        try {
          await supabase.from('blog_posts').delete().eq('id', editPostId);
          window.location.href = '/admin/dashboard.html';
        } catch (err) {
          alert('Delete failed: ' + err.message);
        }
      })();
    });

    // Logout
    async function logout() {
      await supabase.auth.signOut();
      sessionStorage.removeItem('nexgen_admin_role');
      window.location.href = '/auth.html';
    }
    document.getElementById('logout-btn').addEventListener('click', logout);
    document.getElementById('mobile-logout').addEventListener('click', logout);

    // Mobile sidebar
    document.getElementById('mobile-menu-btn').addEventListener('click', () => {
      document.getElementById('mobile-sidebar').classList.remove('hidden');
    });
    document.getElementById('close-mobile').addEventListener('click', () => {
      document.getElementById('mobile-sidebar').classList.add('hidden');
    });
    document.getElementById('mobile-sidebar').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) document.getElementById('mobile-sidebar').classList.add('hidden');
    });
  </script>
</body>
</html>
