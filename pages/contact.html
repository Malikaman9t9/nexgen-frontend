<!DOCTYPE html>
<html lang="en-US" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | NexGenWebLab Technical Support</title>
    <meta name="description" content="Get in touch with the NexGenWebLab team. 24/7 technical support for enterprise SEO auditing, white label reports, and billing inquiries.">
    <meta name="keywords" content="seo support, technical seo help, seo audit support, contact seo agency">
    <link rel="canonical" href="https://nexgenweblab.com/contact">
    <link rel="icon" type="image/png" href="/assets/images/favicon.png?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] }, colors: { primary: '#6D28D9', secondary: '#DB2777' } } } }
    </script>
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "ContactPage",
        "name": "Contact NexGenWebLab Support",
        "description": "Contact the NexGenWebLab team for technical SEO audit support, billing, and enterprise inquiries.",
        "url": "https://nexgenweblab.com/contact",
        "mainEntity": {
            "@type": "Organization",
            "name": "NexGenWebLab",
            "email": "support@nexgenweblab.com",
            "url": "https://nexgenweblab.com"
        }
    }
    </script>
    <style>.hero-gradient { background: radial-gradient(circle at top right, rgba(109, 40, 217, 0.08), transparent), radial-gradient(circle at bottom left, rgba(219, 39, 119, 0.05), transparent); }</style>
</head>
<body class="bg-white text-slate-900 antialiased flex flex-col min-h-screen hero-gradient overflow-x-hidden">

    <main class="flex-grow">
        <section class="relative pt-20 md:pt-28 pb-16 md:pb-20 overflow-hidden">
            <div class="absolute top-0 left-0 w-[400px] h-[400px] bg-secondary/5 rounded-full blur-[100px]"></div>
            <div class="max-w-6xl mx-auto px-4 grid lg:grid-cols-2 gap-16 lg:gap-20 items-center relative z-10">
                <div data-aos="fade-right">
                    <span class="text-primary font-black uppercase tracking-widest text-xs md:text-sm">Get in Touch</span>
                    <h1 class="text-4xl md:text-6xl lg:text-6xl font-black tracking-tight mt-4 mb-6 leading-[1.05]">We're Here to <span class="bg-gradient-to-r from-primary to-secondary text-transparent bg-clip-text">Help You</span></h1>
                    <p class="text-lg md:text-xl text-slate-500 font-bold leading-relaxed mb-10">Need help with your technical SEO audit, white label reports, or enterprise billing? Our support team is available 24/7.</p>
                    <div class="space-y-6">
                        <div class="flex items-center gap-5 p-6 bg-slate-50 rounded-2xl border border-slate-200">
                            <div class="w-14 h-14 bg-white shadow-md rounded-2xl flex items-center justify-center text-primary text-xl shrink-0"><i class="fa-solid fa-envelope"></i></div>
                            <div><p class="text-xs font-black text-slate-400 uppercase tracking-widest">Email Support</p><a href="mailto:support@nexgenweblab.com" class="text-lg font-black text-slate-900 hover:text-primary transition-colors">support@nexgenweblab.com</a></div>
                        </div>
                        <div class="flex items-center gap-5 p-6 bg-slate-50 rounded-2xl border border-slate-200">
                            <div class="w-14 h-14 bg-white shadow-md rounded-2xl flex items-center justify-center text-secondary text-xl shrink-0"><i class="fa-solid fa-clock"></i></div>
                            <div><p class="text-xs font-black text-slate-400 uppercase tracking-widest">Response Time</p><p class="text-lg font-black text-slate-900">Average 2-4 hours</p></div>
                        </div>
                    </div>
                </div>
                <div class="bg-white rounded-[3rem] p-8 md:p-12 shadow-2xl border border-slate-100" data-aos="fade-left">
                    <form id="contact-form" action="https://formspree.io/f/xgoddlky" method="POST" class="space-y-6">
                        <div class="grid md:grid-cols-2 gap-5">
                            <input type="text" name="name" placeholder="Full Name" required class="w-full px-5 py-4 rounded-2xl bg-slate-50 border border-slate-200 outline-none focus:border-primary focus:bg-white transition-all font-bold text-base">
                            <input type="email" name="_replyto" placeholder="Work Email" required class="w-full px-5 py-4 rounded-2xl bg-slate-50 border border-slate-200 outline-none focus:border-primary focus:bg-white transition-all font-bold text-base">
                        </div>
                        <input type="hidden" name="_subject" value="NexGenWebLab Contact Form">
                        <select name="subject" class="w-full px-5 py-4 rounded-2xl bg-slate-50 border border-slate-200 outline-none focus:border-primary focus:bg-white transition-all font-bold text-base text-slate-600">
                            <option value="">Select Subject</option>
                            <option value="technical-support">Technical Support</option>
                            <option value="billing">Billing Inquiry</option>
                            <option value="enterprise-sales">Enterprise Sales</option>
                            <option value="feature-request">Feature Request</option>
                            <option value="partnership">Partnership</option>
                        </select>
                        <textarea name="message" placeholder="How can we help you?" rows="5" required class="w-full px-5 py-4 rounded-2xl bg-slate-50 border border-slate-200 outline-none focus:border-primary focus:bg-white transition-all font-bold text-base"></textarea>
                        <button type="submit" class="w-full py-5 bg-slate-900 text-white font-black rounded-2xl hover:bg-slate-800 transition-all text-lg shadow-lg flex items-center justify-center gap-3" id="contact-submit-btn">
                            Send Message <i class="fa-solid fa-arrow-right"></i>
                        </button>
                        <p id="contact-status" class="text-center text-sm font-bold hidden"></p>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="/assets/js/site.js"></script>
    <script>
        document.getElementById('contact-form')?.addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('contact-submit-btn');
            const status = document.getElementById('contact-status');
            const form = this;

            btn.innerHTML = 'Sending... <i class="fa-solid fa-spinner fa-spin"></i>';
            btn.disabled = true;
            status.classList.add('hidden');

            try {
                const resp = await fetch(form.action, {
                    method: 'POST',
                    body: new FormData(form),
                    headers: { 'Accept': 'application/json' }
                });
                if (resp.ok) {
                    status.classList.remove('hidden');
                    status.className = 'text-center text-sm font-bold text-emerald-600';
                    status.textContent = 'Message sent! We will get back to you within 2-4 hours.';
                    form.reset();
                } else {
                    throw new Error('Server responded with ' + resp.status);
                }
            } catch (err) {
                status.classList.remove('hidden');
                status.className = 'text-center text-sm font-bold text-red-500';
                status.textContent = 'Failed to send. Please email us directly at support@nexgenweblab.com.';
            }

            btn.innerHTML = 'Send Message <i class="fa-solid fa-arrow-right"></i>';
            btn.disabled = false;
        });
    </script>
</body>
</html>
