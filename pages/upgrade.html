<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upgrade to Pro | NexGenWebLab</title>
    <meta name="description" content="Upgrade to NexGenWebLab Enterprise Pro for white label SEO reports, bulk analysis, and traffic analytics.">
    <link rel="icon" type="image/png" href="/assets/images/favicon.png?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] }, colors: { primary: '#6D28D9', secondary: '#DB2777' } } } }
    </script>
</head>
<body class="min-h-screen bg-slate-100 font-sans text-slate-900 antialiased flex flex-col relative overflow-hidden">
    <div class="absolute top-0 right-0 w-[500px] h-[500px] bg-primary/10 rounded-full blur-3xl translate-x-1/2 -translate-y-1/2"></div>
    <div class="absolute bottom-0 left-0 w-[500px] h-[500px] bg-secondary/10 rounded-full blur-3xl -translate-x-1/2 translate-y-1/2"></div>

    <a href="/" class="absolute top-6 left-6 z-20 flex items-center gap-2 text-sm font-bold text-slate-500 hover:text-slate-900 transition-colors bg-white/80 backdrop-blur-sm px-4 py-2.5 rounded-xl shadow-sm border border-slate-200">
        <i class="fa-solid fa-arrow-left"></i> Back to Home
    </a>

    <div class="w-full max-w-lg mx-auto bg-white rounded-[2.5rem] shadow-2xl border border-slate-200 p-8 sm:p-12 my-12 relative z-10">
        <div class="text-center mb-8">
            <div class="w-14 h-14 bg-gradient-to-br from-primary to-secondary rounded-2xl flex items-center justify-center mx-auto mb-5 shadow-lg">
                <i class="fa-solid fa-crown text-white text-xl"></i>
            </div>
            <h1 class="text-3xl font-black tracking-tight">Upgrade to Enterprise Pro</h1>
            <p class="text-slate-500 font-medium mt-2">Unlock white label reports, bulk analysis, and traffic analytics.</p>
        </div>

        <form id="auth-form" class="space-y-5">
            <input type="hidden" name="plan" value="pro">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Email address</label>
                <input type="email" id="email" required placeholder="you@company.com" class="w-full px-5 py-4 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:border-primary outline-none transition-all font-medium text-lg">
            </div>
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Password</label>
                <input type="password" id="password" required placeholder="••••••••" minlength="6" class="w-full px-5 py-4 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:border-primary outline-none transition-all font-medium text-lg">
            </div>

            <div class="bg-gradient-to-r from-primary/5 to-secondary/5 border border-primary/10 rounded-2xl p-5">
                <div class="flex items-center gap-3 text-sm font-bold text-slate-700">
                    <i class="fa-solid fa-crown text-secondary"></i>
                    Enterprise Pro — <span class="text-secondary">$9.99/month</span>
                </div>
                <ul class="mt-3 space-y-2 text-xs font-medium text-slate-600">
                    <li class="flex items-center gap-2"><i class="fa-solid fa-check text-emerald-500 text-xs"></i> White Label Reports</li>
                    <li class="flex items-center gap-2"><i class="fa-solid fa-check text-emerald-500 text-xs"></i> Bulk SEO Analysis</li>
                    <li class="flex items-center gap-2"><i class="fa-solid fa-check text-emerald-500 text-xs"></i> Traffic Analytics</li>
                </ul>
            </div>

            <button type="submit" class="w-full py-4 rounded-xl font-bold bg-gradient-to-r from-primary to-secondary text-white hover:brightness-110 transition-all mt-2 text-lg shadow-lg flex items-center justify-center gap-2">
                Upgrade Now — $9.99/mo <i class="fa-solid fa-arrow-right"></i>
            </button>
        </form>

        <p class="text-center text-xs text-slate-400 font-medium mt-6">14-day money-back guarantee. Cancel anytime.</p>

        <p class="text-center text-slate-600 mt-8 font-medium border-t border-slate-100 pt-8">
            Already have an account? <a href="https://tools.nexgenweblab.com" class="text-primary font-bold hover:underline">Log in →</a>
        </p>
    </div>

    <script src="/assets/js/auth.js"></script>
</body>
</html>
