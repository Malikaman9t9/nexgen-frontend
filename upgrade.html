<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upgrade to Enterprise Pro | NexGenWebLab</title>
    <link rel="icon" type="image/png" href="/assets/images/favicon.png?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'], }, colors: { primary: '#6D28D9', secondary: '#DB2777', } } } }
    </script>
</head>
<body class="min-h-screen bg-slate-50 font-sans text-slate-900 antialiased flex flex-col items-center justify-center p-4">

    <a href="https://nexgenweblab.com/pricing" class="absolute top-8 left-8 text-sm font-bold text-slate-500 hover:text-slate-900 transition-colors flex items-center gap-2">
        <i class="fa-solid fa-arrow-left"></i> Back
    </a>

    <div class="w-full max-w-4xl grid md:grid-cols-2 gap-8 items-start my-8">
        
        <div class="bg-slate-900 rounded-[2rem] p-10 text-white shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 right-0 w-64 h-64 bg-primary/30 rounded-full blur-3xl -translate-y-1/2 translate-x-1/2"></div>
            <h2 class="text-3xl font-black mb-4 relative z-10">Enterprise Pro</h2>
            <div class="mb-8 flex items-baseline relative z-10">
                <span class="text-5xl font-black">$9.99</span>
                <span class="text-slate-400 font-bold ml-2">/ month</span>
            </div>
            <ul class="space-y-5 text-lg font-medium mb-8 relative z-10">
                <li class="flex items-start gap-4"><i class="fa-solid fa-circle-check text-secondary mt-1"></i> Live Traffic API Analytics</li>
                <li class="flex items-start gap-4"><i class="fa-solid fa-circle-check text-secondary mt-1"></i> Bulk Excel Analysis Engine</li>
                <li class="flex items-start gap-4"><i class="fa-solid fa-circle-check text-secondary mt-1"></i> Full AI Growth Strategy</li>
                <li class="flex items-start gap-4"><i class="fa-solid fa-circle-check text-secondary mt-1"></i> Export .DOCX Agency Reports</li>
            </ul>
        </div>

        <div class="bg-white rounded-[2rem] p-10 shadow-xl border border-slate-200">
            <div class="flex justify-between items-center border-b border-slate-100 pb-6 mb-6">
                <h3 class="text-2xl font-black">Checkout</h3>
                <span class="text-sm font-bold text-secondary uppercase tracking-widest"><i class="fa-brands fa-cc-stripe mr-1"></i> Payoneer / Card</span>
            </div>
            
            <form id="upgrade-form" class="space-y-5">
                <div>
                    <label class="block text-xs font-bold text-slate-500 mb-2 uppercase">Card / Account Number</label>
                    <input type="text" required placeholder="0000 0000 0000 0000" class="w-full px-5 py-4 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:border-primary outline-none transition-all font-medium text-lg">
                </div>
                <div class="flex gap-4">
                    <div class="w-1/2">
                        <label class="block text-xs font-bold text-slate-500 mb-2 uppercase">Expiry</label>
                        <input type="text" required placeholder="MM/YY" class="w-full px-5 py-4 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:border-primary outline-none font-medium text-lg">
                    </div>
                    <div class="w-1/2">
                        <label class="block text-xs font-bold text-slate-500 mb-2 uppercase">CVC</label>
                        <input type="text" required placeholder="123" class="w-full px-5 py-4 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:border-primary outline-none font-medium text-lg">
                    </div>
                </div>
                <button type="submit" id="pay-btn" class="w-full py-5 px-6 rounded-2xl font-black bg-gradient-to-r from-primary to-secondary text-white hover:opacity-90 transition-opacity mt-4 text-xl shadow-lg">
                    Complete Upgrade
                </button>
            </form>
            <p class="text-center text-xs font-bold text-slate-400 mt-6"><i class="fa-solid fa-lock mr-1"></i> Secure 256-bit SSL Payment</p>
        </div>
    </div>

    <script>
        document.getElementById('upgrade-form').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn = document.getElementById('pay-btn');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Verifying...';
            btn.disabled = true;

            // URL se login details pakar rahe hain
            const urlParams = new URLSearchParams(window.location.search);
            const em = urlParams.get('em') || '';
            const pw = urlParams.get('pw') || '';

            setTimeout(() => {
                alert("Payment Successful! Welcome to Enterprise Pro.");
                window.location.href = `https://tools.nexgenweblab.com/?em=${encodeURIComponent(em)}&pw=${encodeURIComponent(pw)}`;
            }, 1500);
        });
    </script>
</body>
</html>
