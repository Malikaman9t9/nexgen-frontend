<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | NexGenWebLab</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'], },
                    colors: { primary: '#6D28D9', secondary: '#DB2777', }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="min-h-screen bg-slate-50 font-sans text-slate-900 antialiased flex flex-col justify-center items-center p-4">

    <a href="home.html" class="absolute top-6 left-6 text-sm font-semibold text-slate-500 hover:text-slate-900 transition-colors">
        <i class="fa-solid fa-arrow-left mr-2"></i> Back to Home
    </a>

    <div class="w-full max-w-md bg-white rounded-3xl shadow-xl shadow-slate-200/50 border border-slate-200 p-8 sm:p-10">
        
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-primary/10 text-primary text-2xl mb-4">
                <i class="fa-solid fa-chart-line"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-tight">Welcome back</h1>
            <p class="text-slate-500 text-sm mt-2">Log in to your NexGenWebLab account</p>
        </div>

        <form id="auth-form" class="space-y-5">
            <div>
                <label for="email" class="block text-sm font-semibold text-slate-700 mb-1.5">Email address</label>
                <input type="email" id="email" required placeholder="you@company.com" 
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all font-medium">
            </div>
            
            <div>
                <div class="flex justify-between items-center mb-1.5">
                    <label for="password" class="block text-sm font-semibold text-slate-700">Password</label>
                    <a href="#" class="text-xs font-semibold text-primary hover:underline">Forgot password?</a>
                </div>
                <input type="password" id="password" required placeholder="••••••••" 
                    class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:border-primary focus:ring-2 focus:ring-primary/20 outline-none transition-all font-medium">
            </div>

            <button type="submit" class="w-full py-3 px-4 rounded-xl font-bold bg-slate-900 text-white hover:bg-slate-800 transition-colors mt-2">
                Sign In
            </button>
        </form>

        <div class="mt-6 relative flex items-center justify-center">
            <div class="absolute w-full border-t border-slate-200"></div>
            <span class="bg-white px-4 text-xs font-medium text-slate-400 relative z-10 uppercase tracking-wider">Or continue with</span>
        </div>

        <button class="mt-6 w-full py-3 px-4 rounded-xl font-bold border border-slate-200 text-slate-700 bg-white hover:bg-slate-50 transition-colors flex items-center justify-center gap-2">
            <i class="fa-brands fa-google text-red-500"></i> Google
        </button>

        <p class="text-center text-sm text-slate-600 mt-8 font-medium">
            Don't have an account? <a href="#" class="text-primary hover:underline">Sign up for free</a>
        </p>
    </div>

    <script src="assets/js/auth.js"></script>
</body>
</html>
