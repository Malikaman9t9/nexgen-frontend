<!DOCTYPE html>
<html lang="en-US" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - NexGenWebLab</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="/assets/images/favicon.ico" sizes="any">
    <link rel="icon" href="/assets/images/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="/assets/images/apple-touch-icon.png">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'] }, colors: { primary: '#6D28D9', secondary: '#DB2777' } } } }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        (function () {
            var p = new URLSearchParams(window.location.search);
            var a = p.get('authorized'), t = p.get('t');
            if (a !== 'true' || !t || isNaN(Date.now() - parseInt(t)) || (Date.now() - parseInt(t)) > 300000) {
                window.location.href = '/auth.html?redirect=admin';
            }
        })();
    </script>
    <style>
        .hero-gradient { background: radial-gradient(circle at top right, rgba(109, 40, 217, 0.08), transparent), radial-gradient(circle at bottom left, rgba(219, 39, 119, 0.05), transparent); }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .tab-btn { transition: all 0.2s ease; }
        .tab-btn::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; background: #6D28D9; border-radius: 3px 3px 0 0; transform: scaleX(0); transition: transform 0.2s ease; }
        .tab-btn.active::after { transform: scaleX(1); }
        .markdown-preview h1, .markdown-preview h2, .markdown-preview h3, .markdown-preview h4 { font-weight: 900; margin-bottom: 0.75rem; line-height: 1.2; }
        .markdown-preview h1 { font-size: 1.75rem; }
        .markdown-preview h2 { font-size: 1.5rem; }
        .markdown-preview p { margin-bottom: 1rem; line-height: 1.7; color: #475569; }
        .markdown-preview ul, .markdown-preview ol { margin-bottom: 1rem; padding-left: 1.5rem; }
        .markdown-preview li { margin-bottom: 0.25rem; color: #475569; }
        .markdown-preview blockquote { border-left: 4px solid #6D28D9; padding-left: 1rem; margin: 1rem 0; color: #64748b; font-style: italic; }
        .markdown-preview code { background: #f1f5f9; padding: 2px 8px; border-radius: 4px; font-size: 0.875rem; }
        .markdown-preview pre { background: #1e293b; color: #e2e8f0; padding: 1rem; border-radius: 12px; overflow-x: auto; margin-bottom: 1rem; }
        .markdown-preview pre code { background: none; color: inherit; padding: 0; }
        .markdown-preview img { max-width: 100%; border-radius: 12px; margin: 1rem 0; }
        .markdown-preview a { color: #6D28D9; font-weight: 600; }
        .markdown-preview a:hover { text-decoration: underline; }
        .markdown-preview hr { margin: 1.5rem 0; border-color: #e2e8f0; }
        .scroll-reveal { opacity: 0; transform: translateY(30px); transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        .scroll-reveal.revealed { opacity: 1; transform: translateY(0); }
        .status-published { color: #059669; }
        .status-draft { color: #d97706; }
        .status-archived { color: #dc2626; }
    </style>
</head>
<body class="bg-white text-slate-900 antialiased selection:bg-primary selection:text-white flex flex-col min-h-screen hero-gradient">
    <div id="auth-loading" class="fixed inset-0 z-[100] bg-white flex items-center justify-center">
        <div class="text-center">
            <div class="inline-block w-12 h-12 border-4 border-primary/20 border-t-primary rounded-full animate-spin mb-4"></div>
            <p class="text-slate-500 font-bold text-sm">Verifying access...</p>
        </div>
    </div>
    <main class="flex-grow pt-16 md:pt-28 pb-16 md:pb-20" id="admin-content" style="display:none">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8" id="admin-dashboard">
            <div class="flex flex-col md:flex-row md:items-center md:justify-between gap-4 mb-8 pb-6 border-b border-slate-200" data-aos="fade-up">
                <div>
                    <h1 class="text-3xl md:text-4xl font-black text-slate-950">Admin Dashboard</h1>
                    <p class="text-slate-500 font-bold text-sm mt-1">Manage your blog content</p>
                </div>
                <div class="flex items-center gap-4">
                    <div class="flex items-center gap-3 bg-white px-4 py-2 rounded-2xl shadow-sm border border-slate-200">
                        <img id="user-avatar" src="assets/images/ss.png" alt="" class="w-9 h-9 rounded-full object-cover border-2 border-slate-200">
                        <div>
                            <p id="user-name" class="text-sm font-bold text-slate-900">Admin</p>
                            <p class="text-xs text-slate-400 font-medium">Administrator</p>
                        </div>
                    </div>
                    <button id="logout-btn" class="px-5 py-2.5 bg-red-50 text-red-600 rounded-xl font-bold text-sm hover:bg-red-100 transition-all flex items-center gap-2 border border-red-200">
                        <i class="fa-solid fa-right-from-bracket"></i> Logout
                    </button>
                </div>
            </div>

            <div class="flex gap-1 mb-8 bg-slate-100 p-1.5 rounded-2xl w-fit" data-aos="fade-up" data-aos-delay="50">
                <button class="tab-btn active relative px-6 py-3 rounded-xl font-bold text-sm bg-white text-primary shadow-sm" data-tab="posts">
                    <i class="fa-solid fa-pen-fancy mr-2"></i>Blog Posts
                </button>
                <button class="tab-btn relative px-6 py-3 rounded-xl font-bold text-sm text-slate-500 hover:text-slate-700" data-tab="settings">
                    <i class="fa-solid fa-gear mr-2"></i>Settings
                </button>
            </div>

            <div id="posts-tab" class="tab-content">
                <div class="grid lg:grid-cols-5 gap-8">
                    <div class="lg:col-span-3 space-y-8">
                        <div class="bg-white rounded-[2rem] shadow-sm border border-slate-200 overflow-hidden" data-aos="fade-up">
                            <div class="bg-gradient-to-r from-primary to-secondary p-6">
                                <h2 class="text-xl font-black text-white flex items-center gap-3">
                                    <i class="fa-solid fa-plus-circle"></i> Create New Blog Post
                                </h2>
                            </div>
                            <div class="p-6 md:p-8">
                                <form id="blog-post-form" class="space-y-5">
                                    <div>
                                        <label for="title-input" class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">Title</label>
                                        <input type="text" id="title-input" placeholder="Enter blog post title" required class="w-full px-5 py-4 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/10 transition-all font-bold text-base">
                                    </div>

                                    <div class="grid sm:grid-cols-2 gap-5">
                                        <div>
                                            <label for="featured-image-input" class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">Featured Image URL</label>
                                            <input type="url" id="featured-image-input" placeholder="https://example.com/image.jpg" class="w-full px-5 py-4 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/10 transition-all font-medium text-sm">
                                        </div>
                                        <div>
                                            <label for="status-select" class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">Status</label>
                                            <select id="status-select" class="w-full px-5 py-4 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/10 transition-all font-bold text-sm">
                                                <option value="draft">Draft</option>
                                                <option value="published">Published</option>
                                                <option value="archived">Archived</option>
                                            </select>
                                        </div>
                                    </div>

                                    <div>
                                        <label for="tags-input" class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">Tags (comma separated)</label>
                                        <input type="text" id="tags-input" placeholder="seo, web development, marketing" class="w-full px-5 py-4 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/10 transition-all font-medium text-sm">
                                        <div id="tags-display" class="flex flex-wrap gap-2 mt-3"></div>
                                    </div>

                                    <div>
                                        <label for="markdown-input" class="block text-xs font-bold text-slate-700 uppercase tracking-wider mb-2">Content (Markdown)</label>
                                        <textarea id="markdown-input" placeholder="Write your blog post in markdown format..." class="w-full px-5 py-4 rounded-xl border border-slate-200 bg-slate-50 focus:bg-white focus:border-primary focus:outline-none focus:ring-2 focus:ring-primary/10 transition-all font-mono text-sm min-h-[300px]"></textarea>
                                    </div>

                                    <div class="bg-slate-50 rounded-xl border border-slate-200 p-6">
                                        <h3 class="text-sm font-black text-slate-700 uppercase tracking-wider mb-4 flex items-center gap-2">
                                            <i class="fa-solid fa-eye text-primary"></i> Preview
                                        </h3>
                                        <div id="markdown-preview" class="markdown-preview prose prose-sm max-w-none"></div>
                                    </div>

                                    <button type="submit" id="save-post-btn" class="w-full py-4 rounded-xl font-bold bg-gradient-to-r from-primary to-secondary text-white hover:brightness-110 transition-all text-base shadow-lg flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
                                        <i class="fa-solid fa-cloud-upload-alt"></i>
                                        <span>Save Post</span>
                                    </button>
                                </form>
                            </div>
                        </div>
                    </div>

                    <div class="lg:col-span-2 space-y-8">
                        <div class="bg-white rounded-[2rem] shadow-sm border border-slate-200 overflow-hidden sticky top-28" data-aos="fade-up" data-aos-delay="100">
                            <div class="bg-slate-900 p-6">
                                <h2 class="text-xl font-black text-white flex items-center gap-3">
                                    <i class="fa-solid fa-list"></i> All Blog Posts
                                </h2>
                            </div>
                            <div class="p-6 md:p-8">
                                <div id="posts-list">
                                    <div class="text-center py-12">
                                        <div class="inline-block w-8 h-8 border-4 border-primary/20 border-t-primary rounded-full animate-spin"></div>
                                        <p class="text-slate-500 font-bold text-sm mt-3">Loading posts...</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div id="settings-tab" class="tab-content hidden">
                <div class="max-w-2xl">
                    <div class="bg-white rounded-[2rem] shadow-sm border border-slate-200 overflow-hidden" data-aos="fade-up">
                        <div class="bg-slate-900 p-6">
                            <h2 class="text-xl font-black text-white flex items-center gap-3">
                                <i class="fa-solid fa-gear"></i> Admin Settings
                            </h2>
                        </div>
                        <div class="p-8 text-center">
                            <div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-4">
                                <i class="fa-solid fa-tools text-slate-400 text-2xl"></i>
                            </div>
                            <p class="text-slate-500 font-bold">Settings management coming soon.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="delete-modal" class="fixed inset-0 z-50 hidden">
        <div class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>
        <div class="relative z-10 flex items-center justify-center min-h-screen px-4">
            <div class="bg-white rounded-3xl shadow-2xl p-8 max-w-md w-full" data-aos="zoom-in">
                <div class="text-center">
                    <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
                        <i class="fa-solid fa-trash-can text-red-500 text-2xl"></i>
                    </div>
                    <h3 class="text-xl font-black text-slate-900 mb-2">Delete Post</h3>
                    <p class="text-slate-500 font-medium mb-6">Are you sure you want to delete this post? This action cannot be undone.</p>
                    <div class="flex gap-3">
                        <button id="cancel-delete" class="flex-1 py-3 rounded-xl font-bold border-2 border-slate-200 text-slate-600 hover:border-slate-300 transition-all">Cancel</button>
                        <button id="confirm-delete" class="flex-1 py-3 rounded-xl font-bold bg-red-500 text-white hover:bg-red-600 transition-all">Delete</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="/assets/js/site.js"></script>
    <script src="/assets/js/admin.js"></script>
</body>
</html>
